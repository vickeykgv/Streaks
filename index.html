    <!-- Anti-FOUC: apply saved theme before React renders -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
